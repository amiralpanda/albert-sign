name: Contrat de Design Partnership (Ugani)
description: Variante du contrat de Design Partnership pour Ugani Prosthetics — sans mention du capital (usage belge), avec numéro BCE, sortie possible à 3 et 6 mois, ajout ad-hoc trimestriel de licences
type: contract
documentType: design_partnership
requiresSignature: true

sections:
  - id: client
    label: Identification du Client
    variables:
      - id: clientName
        label: Nom du Client
        type: text
        required: true
        source: client.name
      - id: legalForm
        label: Forme juridique
        type: text
        required: true
        placeholder: "Besloten Vennootschap (BV) de droit belge"
        source: client.legalForm
      - id: address
        label: Adresse du siège social
        type: text
        required: true
        source: client.registeredAddress
      - id: bceNumber
        label: Numéro BCE (Banque-Carrefour des Entreprises)
        type: text
        required: true
        placeholder: "BE 0123.456.789"
      - id: legalRepName
        label: Nom du représentant légal
        type: text
        required: true
        source: client.legalRepName
      - id: legalRepTitle
        label: Qualité du représentant légal
        type: text
        required: true
        placeholder: "CEO, Gérant, Administrateur..."
        source: client.legalRepTitle

  - id: licence
    label: Licences & Redevance
    variables:
      - id: nbLicences
        label: Nombre de licences Utilisateurs (de base)
        type: text
        required: true
      - id: prixLicenceAnnuel
        label: Prix annuel par licence (euros HT)
        type: text
        required: true
        placeholder: "600"
      - id: redevanceAnnuelle
        label: "Redevance annuelle totale (euros HT)"
        type: computed
        required: true
        formula: "nbLicences * prixLicenceAnnuel"

  - id: payment
    label: Modalités de paiement
    variables:
      - id: periodicite
        label: Périodicité de paiement
        type: text
        required: true
        placeholder: "trimestrielle"
      - id: modePaiement
        label: Mode de paiement
        type: text
        required: true
        placeholder: "virement bancaire"

  - id: support
    label: Support & Paramétrage
    variables:
      - id: heuresParametrage
        label: Heures de paramétrage initial
        type: text
        required: true
        placeholder: "12"
      - id: heuresSupport
        label: Heures de support par mois
        type: text
        required: true
      - id: tarifSupportSupp
        label: Tarif support supplémentaire (euros HT/heure)
        type: text
        required: true
